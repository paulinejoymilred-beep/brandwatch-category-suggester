<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brandwatch · Category Suggester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d1b2a;
      --navy2: #1a2e45;
      --blue: #0057ff;
      --blue-light: #4d8aff;
      --cyan: #00d4ff;
      --white: #f0f4ff;
      --grey: #8899aa;
      --card: #111e2e;
      --border: rgba(0, 87, 255, 0.2);
    }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,87,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,87,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,87,255,0.12) 0%, transparent 70%);
      top: -200px; right: -200px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      padding: 32px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--blue);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: var(--grey);
      text-transform: uppercase;
    }

    .badge {
      background: rgba(0,87,255,0.15);
      border: 1px solid var(--border);
      color: var(--blue-light);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Hero */
    .hero {
      padding: 60px 0 48px;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(36px, 6vw, 64px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, var(--blue-light), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--grey);
      font-size: 17px;
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* API Key bar */
    .apikey-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .apikey-bar label {
      font-size: 12px;
      font-weight: 500;
      color: var(--grey);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .apikey-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }

    .apikey-bar input::placeholder { color: rgba(136,153,170,0.4); }

    .key-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--grey);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .key-dot.active { background: #00cc66; box-shadow: 0 0 8px #00cc66; }

    /* Main form card */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      margin-bottom: 32px;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    @media (max-width: 640px) {
      .fields-grid { grid-template-columns: 1fr; }
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--grey);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .field input,
    .field select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--blue);
    }

    .field input::placeholder { color: rgba(136,153,170,0.4); }

    .field select option { background: var(--navy2); }

    .btn-generate {
      width: 100%;
      padding: 16px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-generate:hover { background: var(--blue-light); transform: translateY(-1px); }
    .btn-generate:active { transform: translateY(0); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 60px 0;
    }

    .loading.show { display: block; }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(0,87,255,0.2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p {
      color: var(--grey);
      font-size: 14px;
    }

    /* Error */
    .error-box {
      display: none;
      background: rgba(255, 60, 60, 0.1);
      border: 1px solid rgba(255,60,60,0.3);
      border-radius: 12px;
      padding: 16px 20px;
      color: #ff8080;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .error-box.show { display: block; }

    /* Results */
    .results { display: none; }
    .results.show { display: block; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: gap;
      gap: 12px;
    }

    .results-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
    }

    .results-title span { color: var(--grey); font-weight: 400; font-size: 14px; margin-left: 8px; }

    .export-btns { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn-export {
      padding: 8px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--grey);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-export:hover {
      background: rgba(0,87,255,0.1);
      border-color: var(--border);
      color: var(--blue-light);
    }

    .parent-section {
      margin-bottom: 28px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .parent-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .parent-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .parent-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.02em;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .cat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 16px 18px;
      transition: all 0.2s;
    }

    .cat-card:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-2px);
    }

    .cat-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--white);
    }

    .cat-desc {
      font-size: 13px;
      color: var(--grey);
      line-height: 1.5;
      font-weight: 300;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 0 32px;
      color: rgba(136,153,170,0.4);
      font-size: 12px;
      position: relative;
      z-index: 1;
    }

    .copied-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #00cc66;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    .copied-toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">📡</div>
        <span class="logo-text">Brandwatch</span>
      </div>
      <span class="badge">✦ AI-Powered</span>
    </header>

    <div class="hero">
      <h1>Generate your<br><span>Category Taxonomy</span></h1>
      <p>Describe your brand and objective — get a complete Brandwatch category structure in seconds.</p>
    </div>

    <!-- API Key -->
    <div class="apikey-bar">
      <span class="key-dot" id="keyDot"></span>
      <label>Claude API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-api03-..." oninput="updateKeyDot()" />
    </div>

    <!-- Form -->
    <div class="form-card">
      <div class="fields-grid">
        <div class="field">
          <label>Brand Name</label>
          <input type="text" id="brand" placeholder="e.g. L'Oréal" />
        </div>
        <div class="field">
          <label>Industry</label>
          <select id="industry">
            <option value="">Select industry…</option>
            <option>Beauty & Cosmetics</option>
            <option>Fashion & Luxury</option>
            <option>Food & Beverage</option>
            <option>Technology</option>
            <option>Automotive</option>
            <option>Finance & Banking</option>
            <option>Retail</option>
            <option>Healthcare & Pharma</option>
            <option>Travel & Hospitality</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Main Objective</label>
          <select id="objective">
            <option value="">Select objective…</option>
            <option>Brand Perception</option>
            <option>Crisis Detection</option>
            <option>Campaign Tracking</option>
            <option>Competitor Analysis</option>
            <option>Customer Experience</option>
            <option>Product Feedback</option>
            <option>Influencer Monitoring</option>
          </select>
        </div>
      </div>
      <button class="btn-generate" id="generateBtn" onclick="generate()">
        ✦ Generate Category Taxonomy
      </button>
    </div>

    <!-- Error -->
    <div class="error-box" id="errorBox"></div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Claude is building your taxonomy…</p>
    </div>

    <!-- Results -->
    <div class="results" id="results">
      <div class="results-header">
        <div class="results-title">Your Taxonomy <span id="resultsCount"></span></div>
        <div class="export-btns">
          <button class="btn-export" onclick="exportCSV()">📋 Export CSV</button>
          <button class="btn-export" onclick="exportJSON()">{ } Export JSON</button>
        </div>
      </div>
      <div id="taxonomyOutput"></div>
    </div>
  </div>

  <footer>Built for Brandwatch · Powered by Claude AI</footer>
  <div class="copied-toast" id="toast">✓ Copied to clipboard</div>

  <script>
    const COLORS = ['#0057ff', '#00cc88', '#ff5533', '#a855f7', '#f59e0b', '#ec4899'];
    let taxonomyData = null;

    function updateKeyDot() {
      const key = document.getElementById('apiKey').value;
      document.getElementById('keyDot').classList.toggle('active', key.length > 20);
    }

    async function generate() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const brand = document.getElementById('brand').value.trim();
      const industry = document.getElementById('industry').value;
      const objective = document.getElementById('objective').value;

      // Validation
      hideError();
      if (!apiKey) return showError('Please enter your Claude API key above.');
      if (!brand) return showError('Please enter a brand name.');
      if (!industry) return showError('Please select an industry.');
      if (!objective) return showError('Please select a main objective.');

      // UI state
      document.getElementById('generateBtn').disabled = true;
      document.getElementById('loading').classList.add('show');
      document.getElementById('results').classList.remove('show');

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ brand, industry, objective, apiKey })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Something went wrong');

        taxonomyData = data.taxonomy;
        renderTaxonomy(taxonomyData, brand, industry, objective);

      } catch (err) {
        showError(err.message || 'Failed to generate. Check your API key and try again.');
      } finally {
        document.getElementById('generateBtn').disabled = false;
        document.getElementById('loading').classList.remove('show');
      }
    }

    function renderTaxonomy(taxonomy, brand, industry, objective) {
      const container = document.getElementById('taxonomyOutput');
      const total = taxonomy.reduce((acc, p) => acc + p.categories.length, 0);
      document.getElementById('resultsCount').textContent = `— ${taxonomy.length} groups · ${total} categories`;
      container.innerHTML = '';

      taxonomy.forEach((parent, i) => {
        const color = COLORS[i % COLORS.length];
        const delay = i * 80;

        const section = document.createElement('div');
        section.className = 'parent-section';
        section.style.animationDelay = delay + 'ms';

        const catsHTML = parent.categories.map(cat => `
          <div class="cat-card">
            <div class="cat-name">${cat.name}</div>
            <div class="cat-desc">${cat.description}</div>
          </div>
        `).join('');

        section.innerHTML = `
          <div class="parent-header">
            <div class="parent-dot" style="background:${color}; box-shadow: 0 0 8px ${color}"></div>
            <div class="parent-name" style="color:${color}">${parent.parent}</div>
          </div>
          <div class="categories-grid">${catsHTML}</div>
        `;

        container.appendChild(section);
      });

      document.getElementById('results').classList.add('show');
    }

    function exportCSV() {
      if (!taxonomyData) return;
      let csv = 'Parent Category,Category Name,Description\n';
      taxonomyData.forEach(p => {
        p.categories.forEach(c => {
          csv += `"${p.parent}","${c.name}","${c.description.replace(/"/g, '""')}"\n`;
        });
      });
      downloadFile(csv, 'taxonomy.csv', 'text/csv');
      showToast();
    }

    function exportJSON() {
      if (!taxonomyData) return;
      const json = JSON.stringify(taxonomyData, null, 2);
      navigator.clipboard.writeText(json).then(showToast);
    }

    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = '⚠️ ' + msg;
      box.classList.add('show');
    }

    function hideError() {
      document.getElementById('errorBox').classList.remove('show');
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
